---
- name: Create /etc/docker/daemon.json
  become: true
  ansible.builtin.copy:
    src: docker-daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"

- name: Configure Docker apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - https://download.docker.com/linux/debian
    suites:
      - "{{ ansible_distribution_release }}"
    components:
      - stable
    signed_by: https://download.docker.com/linux/debian/gpg
    state: present
    mode: "0644"

- name: Install Packages
  become: true
  ansible.builtin.apt:
    name:
      # infra
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    update_cache: true
    state: latest

- name: Create container network
  become: true
  community.docker.docker_network:
    name: common_network
    driver: bridge

- name: Add current user to 'docker' group
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Create Base Directories
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ manager_setup_app_base_directories }}"

- name: Clone Git repositories with shallow depth if not already cloned
  ansible.builtin.git:
    repo: "git@github.com:{{ github.user }}/{{ item }}.git"
    dest: "{{ ansible_env.HOME }}/repository/{{ item }}"
    accept_hostkey: true
    version: main
    depth: 1
  loop: "{{ manager_setup_app_clone_repositories }}"
  async: 20
  poll: 0
  changed_when: false
  register: manager_setup_app_async_jobs

- name: Wait for async tasks to complete
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ manager_setup_app_async_jobs.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.ansible_job_id is defined
  register: manager_setup_app_async_poll_results
  until: manager_setup_app_async_poll_results.finished
  retries: 30
  delay: 1
